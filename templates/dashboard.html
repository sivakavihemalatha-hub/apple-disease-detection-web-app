{% extends "base.html" %}
{% block content %}

<h2>Dashboard</h2>

<!-- 🔹 Upload Section -->
<div class="card" style="max-width:500px; margin-bottom:20px;">
    <form method="POST" action="/upload" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <br><br>
        <button type="submit" class="btn-primary">Upload & Predict</button>
    </form>
</div>

<!-- 🔹 Result Section -->
{% if prediction %}
<div class="card" style="max-width:500px; text-align:center;">

    <!-- Image -->
    {% if image %}
        <img src="{{ image }}" width="200" style="border-radius:10px;">
        <br><br>
    {% endif %}

    <!-- Prediction -->
    <h3>Prediction: {{ prediction }}</h3>

    <!-- Confidence -->
    <h4>Confidence: {{ confidence }}</h4>

    <!-- Prevention -->
    <h4 style="margin-top:15px;">Prevention:</h4>
    <p>{{ prevention }}</p>

</div>
{% endif %}

{% endblock %}
